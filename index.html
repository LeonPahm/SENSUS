<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Blurred Back Camera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            position: fixed; /* Giữ màn hình cố định trên iOS */
        }

        /* #stage bọc toàn bộ nội dung (video + thanh điều khiển) để
           có thể xoay cùng lúc khi cần ép giao diện dạng ngang */
        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Container chia đôi màn hình cho VR box */
        .vr-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            z-index: 1;
        }

        /* ÉP GIAO DIỆN LUÔN HIỂN THỊ DẠNG NGANG (LANDSCAPE)
           Dùng khi Safari không tự xoay trang (do khóa xoay màn hình
           hoặc trình duyệt giữ nguyên bố cục dọc) nhưng người dùng
           đã xoay ngang điện thoại để lắp vào kính VR box. Xoay cả
           #stage (video + thanh trượt) cùng một lúc để mọi thứ đồng bộ. */
        @media screen and (orientation: portrait) {
            #stage {
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                transform-origin: center center;
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        /* Mỗi bên (trái/phải) chiếm đúng 50% chiều rộng */
        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thẻ video hiển thị cam sau - nhân đôi cho mỗi mắt */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Phủ kín màn hình, có thể bị cắt một chút */

            /* Gaussian Blur mặc định */
            filter: blur(15px);
            -webkit-filter: blur(15px); /* Hỗ trợ Safari/iOS */

            transition: filter 0.1s ease;
        }

        /* Thanh điều khiển độ mờ */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls label {
            color: #fff;
            font-size: 16px;
            white-space: nowrap;
            font-weight: bold;
        }

        .controls input[type="range"] {
            flex-grow: 1;
            accent-color: #007bff; /* Màu nút kéo */
            height: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="stage">
        <div class="vr-container">
            <div class="eye eye-left">
                <video id="webcam-left" autoplay playsinline muted></video>
            </div>
            <div class="eye eye-right">
                <video id="webcam-right" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="controls">
            <label for="blur-slider">Mờ:</label>
            <input type="range" id="blur-slider" min="0" max="80" value="15">
        </div>
    </div>

    <script>
        const videoLeft = document.getElementById('webcam-left');
        const videoRight = document.getElementById('webcam-right');
        const blurSlider = document.getElementById('blur-slider');

        // Hàm yêu cầu quyền và kích hoạt Camera SAU, gán 1 stream cho cả 2 video
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" }, // CHỈ ĐỊNH CAMERA SAU
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoLeft.srcObject = stream;
                videoRight.srcObject = stream;
            } catch (error) {
                console.error("Lỗi camera:", error);

                console.warn("Không ép được cấu hình nghiêm ngặt, thử chế độ ưu tiên tự động...");
                try {
                    const fallbackConstraints = {
                        video: { facingMode: "environment" },
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    videoLeft.srcObject = stream;
                    videoRight.srcObject = stream;
                } catch (fallbackError) {
                    console.error("Lỗi camera (fallback):", fallbackError);
                    alert("Không thể truy cập camera sau. Hãy đảm bảo bạn đã cấp quyền camera cho trình duyệt và đang chạy trên HTTPS.");
                }
            }
        }

        // Lắng nghe sự kiện thanh trượt để thay đổi mức độ Gaussian Blur cho cả 2 mắt
        blurSlider.addEventListener('input', (e) => {
            const blurValue = e.target.value;
            const blurCss = `blur(${blurValue}px)`;
            videoLeft.style.filter = blurCss;
            videoLeft.style.webkitFilter = blurCss;
            videoRight.style.filter = blurCss;
            videoRight.style.webkitFilter = blurCss;
        });

        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
