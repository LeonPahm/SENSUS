<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Khai báo Web App để ép iOS ẩn thanh địa chỉ khi lưu ra màn hình chính -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>VR Camera Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100dvh; 
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }

        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Container chia đôi màn hình VR */
        .vr-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            z-index: 1;
        }

        /* Khung nhìn từng mắt */
        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* Thẻ video hiển thị cam sau */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Sử dụng biến CSS --zoom-level để thay đổi linh hoạt */
            width: calc(100% * var(--zoom-level, 3.0)); 
            height: calc(100% * var(--zoom-level, 3.0)); 
            object-fit: cover; 
            
            /* Gaussian Blur mặc định */
            filter: blur(15px);
            -webkit-filter: blur(15px);
            transition: filter 0.05s linear, width 0.25s cubic-bezier(0.25, 1, 0.5, 1), height 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Dịch chuyển tâm ảnh của 2 mắt ngược chiều nhau để chập hình */
        .eye-left video {
            transform: translate(-45%, -50%);
        }

        .eye-right video {
            transform: translate(-55%, -50%);
        }

        /* Xử lý xoay màn hình ngang khi điện thoại ở chế độ dọc */
        @media screen and (orientation: portrait) {
            #stage {
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                transform-origin: center center;
                transform: translate(-50%, -50%) rotate(90deg);
            }
            .eye-left video {
                transform: translate(-45%, -50%) rotate(-90deg);
            }
            .eye-right video {
                transform: translate(-55%, -50%) rotate(-90deg);
            }
        }

        /* Bảng điều khiển controls hiện đại */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Lớp CSS dùng để ẩn nhanh bảng điều khiển khi chạm màn hình */
        .controls.hidden {
            opacity: 0;
            transform: translate(-50%, 20px);
            pointer-events: none;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: space-between;
        }

        .controls label {
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
            font-weight: bold;
            min-width: 80px;
        }

        .controls input[type="range"] {
            flex-grow: 1;
            accent-color: #007bff; 
            height: 6px;
            cursor: pointer;
        }

        /* DÃY NÚT BẤM ZOOM CHUẨN ĐIỆN THOẠI: 0.5x -> 1.0x -> 2.0x -> 3.0x -> 4.5x */
        .zoom-btn-container {
            display: flex;
            gap: 6px;
        }

        .zoom-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .zoom-btn.active {
            background: #007bff;
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.6);
            transform: scale(1.1);
        }

        /* Gợi ý chạm màn hình */
        .tip-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-align: center;
            width: 100%;
        }

        /* Màn hình phủ bắt đầu */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #007bff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">BẮT ĐẦU VÀO VR</button>
    </div>

    <div id="stage">
        <!-- Chạm vào vùng này để ẩn/hiện thanh điều khiển -->
        <div class="vr-container" id="vr-screen">
            <div class="eye eye-left">
                <video id="webcam-left" autoplay playsinline muted></video>
            </div>
            <div class="eye eye-right">
                <video id="webcam-right" autoplay playsinline muted></video>
            </div>
        </div>

        <!-- Bảng điều khiển tích hợp nút bấm Zoom mới -->
        <div class="controls" id="controls-panel">
            <div class="control-row">
                <label for="blur-slider">Mờ (Blur):</label>
                <input type="range" id="blur-slider" min="0" max="80" value="15">
            </div>
            <div class="control-row">
                <label>Phóng (Zoom):</label>
                <div class="zoom-btn-container">
                    <button class="zoom-btn" data-zoom="0.5">0.5x</button>
                    <button class="zoom-btn" data-zoom="1.0">1.0x</button>
                    <button class="zoom-btn" data-zoom="2.0">2.0x</button>
                    <button class="zoom-btn active" data-zoom="3.0">3.0x</button>
                    <button class="zoom-btn" data-zoom="4.5">4.5x</button>
                </div>
            </div>
            <div class="tip-text">Chạm vào màn hình để Ẩn / Hiện bảng điều khiển</div>
        </div>
    </div>

    <script>
        const videoLeft = document.getElementById('webcam-left');
        const videoRight = document.getElementById('webcam-right');
        const blurSlider = document.getElementById('blur-slider');
        const zoomButtons = document.querySelectorAll('.zoom-btn');
        const controlsPanel = document.getElementById('controls-panel');
        const vrScreen = document.getElementById('vr-screen');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        let wakeLock = null;

        // Thiết lập giá trị Zoom mặc định ban đầu là 3.0x khi mở app
        document.documentElement.style.setProperty('--zoom-level', '3.0');

        // Giữ sáng màn hình
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Toàn màn hình ẩn thanh điều hướng iOS
        function enableFullscreen() {
            const element = document.body; 
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
            window.scrollTo(0, 1);
        }

        // Mở Camera sau
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoLeft.srcObject = stream;
                videoRight.srcObject = stream;
            } catch (error) {
                try {
                    const fallbackConstraints = { video: { facingMode: "environment" }, audio: false };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    videoLeft.srcObject = stream;
                    videoRight.srcObject = stream;
                } catch (fallbackError) {
                    alert("Không thể mở camera sau.");
                }
            }
        }

        startBtn.addEventListener('click', async () => {
            enableFullscreen();
            await requestWakeLock();
            await initCamera();
            startOverlay.style.display = 'none';
        });

        // Xử lý chỉnh độ mờ
        blurSlider.addEventListener('input', (e) => {
            const blurValue = e.target.value;
            const blurCss = `blur(${blurValue}px)`;
            videoLeft.style.filter = blurCss;
            videoLeft.style.webkitFilter = blurCss;
            videoRight.style.filter = blurCss;
            videoRight.style.webkitFilter = blurCss;
        });

        // XỬ LÝ SỰ KIỆN CHO CÁC NÚT BẤM ZOOM
        zoomButtons.forEach(button => {
            button.addEventListener('click', () => {
                zoomButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                const zoomVal = button.getAttribute('data-zoom');
                document.documentElement.style.setProperty('--zoom-level', zoomVal);
            });
        });

        // CHẠM MÀN HÌNH ĐỂ ẨN / HIỆN NHANH BẢNG ĐIỀU KHIỂN
        vrScreen.addEventListener('click', () => {
            controlsPanel.classList.toggle('hidden');
        });
    </script>
</body>
</html>
