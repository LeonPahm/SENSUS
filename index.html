<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Curved Pass-Through</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            position: fixed; 
            top: 0;
            left: 0;
        }

        /* Container chứa canvas 3D hiển thị hiệu ứng VR */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Thanh điều khiển tàng hình nhận diện vuốt chạm toàn màn hình */
        .controls-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0; 
            touch-action: none;
        }

        .controls-overlay input[type="range"] {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            cursor: pointer;
        }
    </style>
    <!-- Tích hợp thư viện Three.js để xử lý bẻ cong hình ảnh bằng công nghệ 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="video-container" id="canvas-container">
        <!-- Thay thế thẻ video cũ bằng Canvas 3D để dựng luồng thấu kính cong VR -->
    </div>

    <!-- Giữ nguyên logic thanh điều khiển ẩn -->
    <div class="controls-overlay">
        <input type="range" id="blur-slider" min="0" max="80" value="15">
    </div>

    <!-- Tạo một thẻ video ẩn dưới nền để nạp dữ liệu camera vào bộ dựng hình 3D -->
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>

    <script>
        const video = document.getElementById('webcam');
        const blurSlider = document.getElementById('blur-slider');
        let renderer, scene, camera, texture, material, mesh;
        let currentBlur = 15;

        // 1. Giữ nguyên logic khởi tạo Camera Sau
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 3840 }, 
                    height: { ideal: 2160 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.addEventListener('loadedmetadata', initVRScene);
            } catch (error) {
                console.warn("Không ép được cấu hình exact, chuyển sang chế độ linh hoạt...");
                try {
                    const fallbackConstraints = {
                        video: { facingMode: "environment" },
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    video.srcObject = stream;
                    video.addEventListener('loadedmetadata', initVRScene);
                } catch (fallbackError) {
                    alert("Yêu cầu chạy trang web qua giao thức HTTPS và cấp quyền camera để kích hoạt chế độ VR.");
                }
            }
        }

        // 2. Logic Mới: Dựng thấu kính cong kiểu VR (Fish-eye bằng WebGL Shader)
        function initVRScene() {
            const container = document.getElementById('canvas-container');
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Tạo khung cảnh 3D
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // Đưa luồng video vào làm kết cấu (Texture) trong không gian 3D
            texture = new THREE.VideoTexture(video);
            
            // Đoạn mã Custom Shader để bẻ cong hình ảnh theo chuẩn kính VR (Barrel Distortion)
            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform sampler2D tDiffuse;
                uniform float uBlur;
                varying vec2 vUv;

                // Hàm giả lập bẻ cong thấu kính lồi VR
                vec2 distort(vec2 uv) {
                    vec2 cc = uv - 0.5;
                    float dist = dot(cc, cc);
                    // Chỉ số 0.25 quyết định độ cong lồi của VR, tăng lên nếu muốn cong hơn
                    return uv + cc * dist * 0.25; 
                }

                void main() {
                    // Áp dụng độ cong
                    vec2 distortedUv = distort(vUv);
                    
                    // Chặn các góc bị lẹm viền đen ngoài khung hình của thấu kính
                    if (distortedUv.x < 0.0 || distortedUv.x > 1.0 || distortedUv.y < 0.0 || distortedUv.y > 1.0) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    // Giữ nguyên logic tính toán độ mờ (Blur) bằng Shader
                    vec4 color = vec4(0.0);
                    float total = 0.0;
                    float radius = uBlur / 1000.0;
                    
                    // Tạo hiệu ứng nhòe Gaussian mượt mà trực tiếp trên Shader
                    if (radius > 0.0) {
                        for (float x = -4.0; x <= 4.0; x += 1.0) {
                            for (float y = -4.0; y <= 4.0; y += 1.0) {
                                vec2 offset = vec2(x, y) * (radius / 4.0);
                                color += texture2D(tDiffuse, distortedUv + offset);
                                total += 1.0;
                            }
                        }
                        gl_FragColor = color / total;
                    } else {
                        gl_FragColor = texture2D(tDiffuse, distortedUv);
                    }
                }
            `;

            // Khởi tạo vật liệu chứa Shader thấu kính VR
            material = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: texture },
                    uBlur: { value: currentBlur }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader
            });

            // Phủ vật liệu lên toàn màn hình
            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Thiết lập bộ dựng hình (Renderer)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Vòng lặp cập nhật hình ảnh liên tục (Render Loop)
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

            // Tự động căn chỉnh khi xoay ngang/dọc điện thoại
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // 3. Giữ nguyên logic lắng nghe thanh trượt để thay đổi mức độ mờ
        blurSlider.addEventListener('input', (e) => {
            currentBlur = parseFloat(e.target.value);
            if (material) {
                material.uniforms.uBlur.value = currentBlur;
            }
        });

        // 4. Giữ nguyên logic kích hoạt Fullscreen khi chạm vào màn hình
        function enterFullScreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.webkitRequestFullScreen) docElm.webkitRequestFullScreen();
            else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
            else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
        }

        window.addEventListener('click', enterFullScreen, { once: true });
        window.addEventListener('touchstart', enterFullScreen, { once: true });

        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
