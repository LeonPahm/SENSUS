<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blurred Back Camera</title>
    <style>
        /* Tối ưu hóa toàn màn hình và loại bỏ các khoảng trống */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            position: fixed; /* Giữ màn hình cố định trên iOS */
        }

        /* Container chứa video, đảm bảo lấp đầy màn hình */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Thẻ video hiển thị cam sau */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Phủ kín màn hình, có thể bị cắt một chút */
            
            /* Gaussian Blur mặc định */
            filter: blur(15px);
            -webkit-filter: blur(15px); /* Hỗ trợ Safari/iOS */
            
            transition: filter 0.1s ease;
        }

        /* Thanh điều khiển độ mờ */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls label {
            color: #fff;
            font-size: 16px;
            white-space: nowrap;
            font-weight: bold;
        }

        .controls input[type="range"] {
            flex-grow: 1;
            accent-color: #007bff; /* Màu nút kéo */
            height: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <label for="blur-slider">Mờ:</label>
        <input type="range" id="blur-slider" min="0" max="80" value="15">
    </div>

    <script>
        const video = document.getElementById('webcam');
        const blurSlider = document.getElementById('blur-slider');

        // Hàm yêu cầu quyền và kích hoạt Camera SAU
        async function initCamera() {
            // Cấu hình bắt buộc (exact) sử dụng camera sau độc quyền
            const constraints = {
                video: {
                    facingMode: { exact: "environment" }, // CHỈ ĐỊNH CAMERA SAU
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false // Không cần micro
            };

            try {
                // Trình duyệt sẽ hiện Pop-up hỏi quyền truy cập camera
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (error) {
                console.error("Lỗi camera:", error);
                
                // Phương án dự phòng: nếu điện thoại không hỗ trợ exact, thử lại chế độ ưu tiên
                console.warn("Không ép được cấu hình nghiêm ngặt, thử chế độ ưu tiên tự động...");
                try {
                    const fallbackConstraints = {
                        video: { facingMode: "environment" }, // ƯU TIÊN CAMERA SAU
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    video.srcObject = stream;
                } catch (fallbackError) {
                    console.error("Lỗi camera (fallback):", fallbackError);
                    alert("Không thể truy cập camera sau. Hãy đảm bảo bạn đã cấp quyền camera cho trình duyệt và đang chạy trên HTTPS.");
                }
            }
        }

        // Lắng nghe sự kiện thanh trượt để thay đổi mức độ Gaussian Blur
        blurSlider.addEventListener('input', (e) => {
            const blurValue = e.target.value;
            video.style.filter = `blur(${blurValue}px)`;
            video.style.webkitFilter = `blur(${blurValue}px)`; // Hỗ trợ Safari
        });

        // Tự động chạy khi trang web tải xong
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
