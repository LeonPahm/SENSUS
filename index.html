<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Passthrough - Trái Phải Chuẩn YouTube</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 70%;
            max-width: 350px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            font-size: 12px;
        }
        input[type=range] {
            width: 60%;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #ff5722;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <button id="start-btn">BẮT ĐẦU XEM VR</button>
        <div class="slider-group">
            <label>Độ mờ (Blur):</label>
            <input type="range" id="blur-slider" min="0" max="0.08" step="0.002" value="0.01">
        </div>
        <div class="slider-group">
            <label>Độ cong thấu kính:</label>
            <input type="range" id="fish-slider" min="0" max="0.8" step="0.05" value="0.3">
        </div>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const blurSlider = document.getElementById('blur-slider');
        const fishSlider = document.getElementById('fish-slider');
        const uiContainer = document.getElementById('ui-container');

        let scene, camera, renderer, videoTexture, shaderMaterial;

        const VRShader = {
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uBlur;
                uniform float uDistortion;
                varying vec2 vUv;

                // Hàm tạo độ cong thấu kính VR (Barrel Distortion) cho từng mắt
                vec2 applyFisheye(vec2 uv, float amt) {
                    vec2 cc = uv - 0.5;
                    float dist = dot(cc, cc);
                    return uv + cc * dist * amt;
                }

                // Bộ lọc làm mờ ảnh mượt mà
                vec4 applyBlur(sampler2D tex, vec2 uv, float intensity) {
                    vec4 color = vec4(0.0);
                    float total = 0.0;
                    for (float x = -2.0; x <= 2.0; x++) {
                        for (float y = -2.0; y <= 2.0; y++) {
                            vec2 offset = vec2(x, y) * intensity * 0.05;
                            color += texture2D(tex, uv + offset);
                            total += 1.0;
                        }
                    }
                    return color / total;
                }

                void main() {
                    vec2 uv = vUv;

                    // 1. CHIA ĐÔI MÀN HÌNH: Trái và Phải hoàn chỉnh (Đường cắt dọc ở giữa máy nằm ngang)
                    bool isRight = uv.x > 0.5;
                    if (isRight) {
                        uv.x = (uv.x - 0.5) * 2.0;
                    } else {
                        uv.x = uv.x * 2.0;
                    }

                    // 2. ÁP DỤNG HIỆU ỨNG MẮT CÁ (Fisheye cho từng ô mắt)
                    uv = applyFisheye(uv, uDistortion);

                    // Cắt các góc đen dư thừa sau khi bo cong thấu kính
                    if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    // 3. ĐỊNH HƯỚNG LẠI CAMERA CHO ĐỨNG THẲNG
                    // Khi điện thoại nằm ngang, luồng camera bị nghiêng 90 độ, ta xoay UV lấy mẫu texture ngược lại để ảnh đứng thẳng.
                    // Đồng thời căn chỉnh lại tỉ lệ (Aspect Ratio) để hình không bị kéo giãn theo chiều ngang.
                    vec2 texCoord;
                    texCoord.x = uv.y; 
                    texCoord.y = 1.0 - uv.x;

                    // Thu hẹp vùng lấy mẫu ở giữa camera để hình ảnh không bị "bẹp" ngang khi đưa vào khung dọc
                    texCoord.x = texCoord.x * 0.6 + 0.2; 

                    // Render hình ảnh kết hợp mờ tùy chỉnh
                    gl_FragColor = applyBlur(tDiffuse, texCoord, uBlur);
                }
            `
        };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                video.play();
                video.onloadedmetadata = () => setupThreeJS();
            } catch (err) {
                // Fallback nếu test trên máy tính hoặc không lấy được cam sau chính xác
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = fallbackStream;
                video.play();
                video.onloadedmetadata = () => setupThreeJS();
            }
        }

        function setupThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            videoTexture = new THREE.VideoTexture(video);

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: videoTexture },
                    uBlur: { value: parseFloat(blurSlider.value) },
                    uDistortion: { value: parseFloat(fishSlider.value) }
                },
                vertexShader: VRShader.vertexShader,
                fragmentShader: VRShader.fragmentShader
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, shaderMaterial);
            scene.add(mesh);

            // Gán sự kiện thay đổi thanh trượt liên tục
            blurSlider.addEventListener('input', (e) => { shaderMaterial.uniforms.uBlur.value = parseFloat(e.target.value); });
            fishSlider.addEventListener('input', (e) => { shaderMaterial.uniforms.uDistortion.value = parseFloat(e.target.value); });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            initCamera();
            startBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
