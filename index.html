<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Passthrough Fix - Auto Rotate</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 85%;
            max-width: 360px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            font-size: 13px;
        }
        input[type=range] {
            width: 55%;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #00E676;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <button id="start-btn">KÍCH HOẠT CAMERA VR</button>
        <div class="slider-group">
            <label for="blur-slider">Độ mờ (Blur):</label>
            <input type="range" id="blur-slider" min="0" max="0.1" step="0.005" value="0.02">
        </div>
        <div class="slider-group">
            <label for="fish-slider">Độ cong kính VR:</label>
            <input type="range" id="fish-slider" min="0" max="1" step="0.05" value="0.25">
        </div>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const blurSlider = document.getElementById('blur-slider');
        const fishSlider = document.getElementById('fish-slider');
        const uiContainer = document.getElementById('ui-container');

        let scene, camera, renderer, videoTexture, shaderMaterial;

        const CustomVRShader = {
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uBlur;
                uniform float uDistortion;
                uniform int uRotateVideo; // 1 nếu cần xoay 90 độ, 0 nếu không
                varying vec2 vUv;

                vec2 barrelDistortion(vec2 coord, float amt) {
                    vec2 cc = coord - 0.5;
                    float dist = dot(cc, cc);
                    return coord + cc * dist * amt;
                }

                vec4 boxBlur(sampler2D tex, vec2 uv, float intensity) {
                    vec4 color = vec4(0.0);
                    float count = 0.0;
                    for (float x = -2.0; x <= 2.0; x++) {
                        for (float y = -2.0; y <= 2.0; y++) {
                            vec2 offset = vec2(x, y) * intensity * 0.1;
                            color += texture2D(tex, uv + offset);
                            count += 1.0;
                        }
                    }
                    return color / count;
                }

                void main() {
                    vec2 uv = vUv;
                    
                    // CHIA ĐÔI MÀN HÌNH THEO TRỤC NGANG (Chuẩn VR khi nằm ngang)
                    bool isRightEye = uv.x > 0.5;
                    if (isRightEye) {
                        uv.x = (uv.x - 0.5) * 2.0;
                    } else {
                        uv.x = uv.x * 2.0;
                    }

                    // Áp dụng hiệu ứng mắt cá cho từng bên mắt
                    uv = barrelDistortion(uv, uDistortion);

                    // Khử vùng thừa ngoài thấu kính
                    if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    // XỬ LÝ XOAY ĐỨNG HÌNH ẢNH CAMERA:
                    // Khi điện thoại nằm ngang, luồng camera di động thường bị nghiêng 90 độ.
                    // Ta tiến hành xoay lại hệ tọa độ lấy mẫu Texture để hình ảnh đứng thẳng.
                    vec2 texCoord = uv;
                    if (uRotateVideo == 1) {
                        texCoord = vec2(uv.y, 1.0 - uv.x); 
                    }

                    // Lấy mẫu màu kèm hiệu ứng làm mờ
                    gl_FragColor = boxBlur(tDiffuse, texCoord, uBlur);
                }
            `
        };

        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
                
                // Đợi video load cấu hình metadata để lấy đúng hướng gốc
                video.onloadedmetadata = () => {
                    setupThreeJS();
                };
            } catch (err) {
                // Fallback nếu không có cam sau (hoặc đang test máy tính)
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = fallbackStream;
                video.play();
                video.onloadedmetadata = () => { setupThreeJS(); };
            }
        }

        function setupThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            videoTexture = new THREE.VideoTexture(video);
            
            // Kiểm tra xem màn hình đang dọc hay ngang để quyết định xoay luồng cam trong Shader
            const shouldRotate = window.innerWidth > window.innerHeight ? 1 : 0;

            const uniforms = {
                tDiffuse: { value: videoTexture },
                uBlur: { value: parseFloat(blurSlider.value) },
                uDistortion: { value: parseFloat(fishSlider.value) },
                uRotateVideo: { value: shouldRotate }
            };

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: CustomVRShader.vertexShader,
                fragmentShader: CustomVRShader.fragmentShader
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, shaderMaterial);
            scene.add(mesh);

            // Cập nhật giá trị khi kéo thanh trượt
            blurSlider.addEventListener('input', (e) => { shaderMaterial.uniforms.uBlur.value = parseFloat(e.target.value); });
            fishSlider.addEventListener('input', (e) => { shaderMaterial.uniforms.uDistortion.value = parseFloat(e.target.value); });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Cập nhật lại trạng thái xoay hình khi người dùng đổi góc cầm máy
            if (shaderMaterial) {
                shaderMaterial.uniforms.uRotateVideo.value = window.innerWidth > window.innerHeight ? 1 : 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            initCamera();
            startBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
