<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Blurred Back Camera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            /* Sử dụng dvh (dynamic viewport height) để tự trừ đi thanh công cụ của trình duyệt */
            height: 100dvh; 
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            position: fixed;
        }

        /* #stage bọc toàn bộ nội dung */
        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Container chia đôi màn hình cho VR box */
        .vr-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            z-index: 1;
        }

        /* Xử lý khi điện thoại ở chế độ dọc */
        @media screen and (orientation: portrait) {
            #stage {
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                transform-origin: center center;
                transform: translate(-50%, -50%) rotate(90deg);
            }
            video {
                transform: rotate(-90deg);
            }
        }

        /* Xử lý khi điện thoại ở chế độ ngang */
        @media screen and (orientation: landscape) {
            video {
                transform: rotate(0deg);
            }
        }

        /* Mỗi bên chiếm đúng 50% chiều rộng */
        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thẻ video hiển thị cam sau */
        video {
            width: 160%; 
            height: 160%;
            object-fit: cover; 
            transform-origin: center center;

            /* Gaussian Blur mặc định */
            filter: blur(15px);
            -webkit-filter: blur(15px);
            transition: filter 0.1s ease;
        }

        /* Thanh điều khiển độ mờ */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls label {
            color: #fff;
            font-size: 16px;
            white-space: nowrap;
            font-weight: bold;
        }

        .controls input[type="range"] {
            flex-grow: 1;
            accent-color: #007bff; 
            height: 8px;
            cursor: pointer;
        }

        /* Màn hình phủ yêu cầu nhấn */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #007bff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">BẮT ĐẦU VR</button>
    </div>

    <div id="stage">
        <div class="vr-container">
            <div class="eye eye-left">
                <video id="webcam-left" autoplay playsinline muted></video>
            </div>
            <div class="eye eye-right">
                <video id="webcam-right" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="controls">
            <label for="blur-slider">Mờ:</label>
            <input type="range" id="blur-slider" min="0" max="80" value="15">
        </div>
    </div>

    <script>
        const videoLeft = document.getElementById('webcam-left');
        const videoRight = document.getElementById('webcam-right');
        const blurSlider = document.getElementById('blur-slider');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        let wakeLock = null;

        // Giữ màn hình luôn sáng
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Kích hoạt Toàn màn hình chuẩn xác cao cho thiết bị di động
        function enableFullscreen() {
            // Đưa toàn bộ thẻ BODY vào chế độ toàn màn hình để triệt tiêu mọi thanh điều hướng bên ngoài
            const element = document.body; 
            
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) { /* Ép mượt cho Safari iOS */
                element.webkitRequestFullscreen();
            } else if (element.mozRequestFullScreen) {
                element.mozRequestFullScreen();
            } else if (element.msRequestFullscreen) {
                element.msRequestFullscreen();
            }

            // Mẹo bổ sung: Tự động cuộn nhẹ trang web để kích hoạt tính năng tự ẩn thanh URL của trình duyệt di động
            window.scrollTo(0, 1);
        }

        // Kích hoạt Camera
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoLeft.srcObject = stream;
                videoRight.srcObject = stream;
            } catch (error) {
                try {
                    const fallbackConstraints = {
                        video: { facingMode: "environment" },
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    videoLeft.srcObject = stream;
                    videoRight.srcObject = stream;
                } catch (fallbackError) {
                    alert("Không thể mở camera sau.");
                }
            }
        }

        startBtn.addEventListener('click', async () => {
            enableFullscreen();
            await requestWakeLock();
            await initCamera();
            startOverlay.style.display = 'none';
        });

        blurSlider.addEventListener('input', (e) => {
            const blurValue = e.target.value;
            const blurCss = `blur(${blurValue}px)`;
            videoLeft.style.filter = blurCss;
            videoLeft.style.webkitFilter = blurCss;
            videoRight.style.filter = blurCss;
            videoRight.style.webkitFilter = blurCss;
        });
    </script>
</body>
</html>
