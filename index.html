<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Background Overlay</title>
    <style>
        /* Xóa khoảng trắng thừa và cố định màn hình */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Video camera tràn toàn màn hình, nằm ở dưới cùng */
        #camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Lật ngược video giống như đang soi gương cho tự nhiên */
            transform: scaleX(-1); 
            opacity: 1; /* Mặc định hiển thị rõ ràng */
            transition: opacity 0.1s ease;
        }

        /* Nội dung giả lập phía sau hoặc chữ trên màn hình (nếu có) */
        .content-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        /* Thanh điều khiển nằm trên cùng */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .controls label {
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
        }

        /* Custom lại thanh trượt nhìn cho hiện đại */
        .controls input[type="range"] {
            width: 200px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Lớp chữ/nền ở dưới cùng (sẽ lộ ra khi bạn làm mờ camera) -->
    <div class="content-bg">
        <div>
            <h1>Màn hình chính</h1>
            <p>Kéo thanh trượt bên dưới để làm mờ lớp camera trước.</p>
        </div>
    </div>

    <!-- Thành phần video để hiển thị camera -->
    <video id="camera-view" autoplay playsinline muted></video>

    <!-- Thanh điều khiển độ mờ -->
    <div class="controls">
        <label for="opacity-slider">Độ rõ camera: <span id="opacity-val">100</span>%</label>
        <input type="range" id="opacity-slider" min="0" max="100" value="100">
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const slider = document.getElementById('opacity-slider');
        const opacityVal = document.getElementById('opacity-val');

        // 1. Hàm kích hoạt camera trước (user)
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        // Ưu tiên gọi camera trước trên điện thoại
                        facingMode: "user" 
                    },
                    audio: false // Không cần âm thanh
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (error) {
                console.error("Không thể truy cập camera:", error);
                alert("Không thể truy cập camera. Vui lòng cấp quyền cho trang web!");
            }
        }

        // 2. Lắng nghe sự kiện kéo thanh trượt để chỉnh độ mờ
        slider.addEventListener('input', (e) => {
            const value = e.target.value;
            // Cập nhật số hiển thị
            opacityVal.textContent = value;
            // Thay đổi opacity của video (giá trị từ 0 đến 1)
            video.style.opacity = value / 100;
        });

        // Khởi chạy camera khi trang web tải xong
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
