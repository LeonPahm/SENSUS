<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Blurred Back Camera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            position: fixed; /* Giữ màn hình cố định trên iOS */
        }

        /* #stage bọc toàn bộ nội dung */
        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Container chia đôi màn hình cho VR box */
        .vr-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            z-index: 1;
        }

        /* Xử lý khi điện thoại ở chế độ dọc */
        @media screen and (orientation: portrait) {
            #stage {
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                transform-origin: center center;
                transform: translate(-50%, -50%) rotate(90deg);
            }
            /* Xoay bù lại góc để camera thẳng đứng */
            video {
                transform: rotate(-90deg);
            }
        }

        /* Xử lý khi điện thoại ở chế độ ngang */
        @media screen and (orientation: landscape) {
            video {
                transform: rotate(0deg);
            }
        }

        /* Mỗi bên (trái/phải) chiếm đúng 50% chiều rộng */
        .eye {
            width: 50%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thẻ video hiển thị cam sau - nhân đôi cho mỗi mắt */
        video {
            width: 150%; 
            height: 150%;
            object-fit: cover; 
            transform-origin: center center;

            /* Gaussian Blur mặc định */
            filter: blur(15px);
            -webkit-filter: blur(15px); /* Hỗ trợ Safari/iOS */
            transition: filter 0.1s ease;
        }

        /* Thanh điều khiển độ mờ */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls label {
            color: #fff;
            font-size: 16px;
            white-space: nowrap;
            font-weight: bold;
        }

        .controls input[type="range"] {
            flex-grow: 1;
            accent-color: #007bff; 
            height: 8px;
            cursor: pointer;
        }

        /* Màn hình phủ yêu cầu nhấn để kích hoạt Fullscreen và Wake Lock */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #007bff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
    </style>
</head>
<body>

    <!-- Lớp phủ bắt buộc nhấn để ẩn thanh công cụ trình duyệt & giữ sáng màn hình -->
    <div id="start-overlay">
        <button id="start-btn">BẮT ĐẦU VR</button>
    </div>

    <div id="stage">
        <div class="vr-container">
            <div class="eye eye-left">
                <video id="webcam-left" autoplay playsinline muted></video>
            </div>
            <div class="eye eye-right">
                <video id="webcam-right" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="controls">
            <label for="blur-slider">Mờ:</label>
            <input type="range" id="blur-slider" min="0" max="80" value="15">
        </div>
    </div>

    <script>
        const videoLeft = document.getElementById('webcam-left');
        const videoRight = document.getElementById('webcam-right');
        const blurSlider = document.getElementById('blur-slider');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        let wakeLock = null;

        // 1. Hàm giữ màn hình luôn sáng (Wake Lock API)
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Đã kích hoạt khóa giữ sáng màn hình!');
                    
                    // Nếu tab bị ẩn rồi mở lại, kích hoạt lại wake lock
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } else {
                    console.warn('Trình duyệt không hỗ trợ Wake Lock API.');
                }
            } catch (err) {
                console.error(`Lỗi giữ sáng màn hình: ${err.message}`);
            }
        }

        // 2. Hàm kích hoạt chế độ Toàn màn hình (Ẩn thanh trắng/thanh địa chỉ)
        function enableFullscreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.mozRequestFullScreen) { /* Firefox */
                docElm.mozRequestFullScreen();
            } else if (docElm.webkitRequestFullScreen) { /* Chrome, Safari & Opera */
                docElm.webkitRequestFullScreen();
            } else if (docElm.msRequestFullscreen) { /* IE/Edge */
                docElm.msRequestFullscreen();
            }
        }

        // 3. Hàm kích hoạt Camera SAU
        async function initCamera() {
            const constraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoLeft.srcObject = stream;
                videoRight.srcObject = stream;
            } catch (error) {
                console.warn("Thử chế độ ưu tiên tự động...");
                try {
                    const fallbackConstraints = {
                        video: { facingMode: "environment" },
                        audio: false
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    videoLeft.srcObject = stream;
                    videoRight.srcObject = stream;
                } catch (fallbackError) {
                    alert("Không thể truy cập camera sau. Đảm bảo chạy trên HTTPS và đã cấp quyền.");
                }
            }
        }

        // Sự kiện khi bấm nút "BẮT ĐẦU VR"
        startBtn.addEventListener('click', async () => {
            // Kích hoạt toàn màn hình để ẩn thanh địa chỉ
            enableFullscreen();
            // Khóa giữ sáng màn hình
            await requestWakeLock();
            // Khởi động camera
            await initCamera();
            // Ẩn lớp màn hình phủ đi
            startOverlay.style.display = 'none';
        });

        // Lắng nghe sự kiện thanh trượt thay đổi độ mờ Gaussian Blur
        blurSlider.addEventListener('input', (e) => {
            const blurValue = e.target.value;
            const blurCss = `blur(${blurValue}px)`;
            videoLeft.style.filter = blurCss;
            videoLeft.style.webkitFilter = blurCss;
            videoRight.style.filter = blurCss;
            videoRight.style.webkitFilter = blurCss;
        });
    </script>
</body>
</html>
