<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Passthrough - Fisheye & Blur</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        /* Giao diện thanh trượt điều khiển */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 80%;
            max-width: 400px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }
        input[type=range] {
            width: 60%;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background: #2196F3;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        /* Ẩn UI khi đang trong chế độ VR hoàn toàn nếu cần */
        .hidden { display: none !important; }
    </style>
    <!-- Nhúng thư viện Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <button id="start-btn">Mở Camera VR</button>
        <div class="slider-group">
            <label for="blur-slider">Độ mờ (Blur):</label>
            <input type="range" id="blur-slider" min="0" max="0.1" step="0.005" value="0.02">
        </div>
        <div class="slider-group">
            <label for="fish-slider">Độ cong thấu kính:</label>
            <input type="range" id="fish-slider" min="0" max="1" step="0.05" value="0.3">
        </div>
    </div>

    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const blurSlider = document.getElementById('blur-slider');
        const fishSlider = document.getElementById('fish-slider');
        const uiContainer = document.getElementById('ui-container');

        let scene, camera, renderer, videoTexture, shaderMaterial;

        // Cấu hình Custom Shader để xử lý Chia đôi màn hình + Mắt cá (Fisheye) + Khử mờ (Blur)
        const CustomVRShader = {
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uBlur;
                uniform float uDistortion;
                varying vec2 vUv;

                // Hàm giả lập biến dạng thấu kính mắt cá (Barrel Distortion)
                vec2 barrelDistortion(vec2 coord, float amt) {
                    vec2 cc = coord - 0.5;
                    float dist = dot(cc, cc);
                    return coord + cc * dist * amt;
                }

                // Hàm làm mờ dạng Box Blur cơ bản bằng cách lấy mẫu chéo xung quanh
                vec4 boxBlur(sampler2D tex, vec2 uv, float intensity) {
                    vec4 color = vec4(0.0);
                    float count = 0.0;
                    for (float x = -2.0; x <= 2.0; x++) {
                        for (float y = -2.0; y <= 2.0; y++) {
                            vec2 offset = vec2(x, y) * intensity * 0.1;
                            color += texture2D(tex, uv + offset);
                            count += 1.0;
                        }
                    }
                    return color / count;
                }

                void main() {
                    vec2 uv = vUv;
                    
                    // Chia đôi màn hình: xác định mắt trái hay mắt phải
                    bool isRightEye = uv.x > 0.5;
                    
                    // Chuẩn hóa UV riêng cho từng nửa màn hình về khoảng [0.0, 1.0]
                    if (isRightEye) {
                        uv.x = (uv.x - 0.5) * 2.0;
                    } else {
                        uv.x = uv.x * 2.0;
                    }

                    // Áp dụng hiệu ứng mắt cá riêng cho từng mắt để không bị lệch trục nhìn
                    uv = barrelDistortion(uv, uDistortion);

                    // Kiểm tra nếu sau khi bo cong, tọa độ vượt quá giới hạn thì cắt bỏ (bọc đen)
                    if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    // Lấy màu từ camera kết hợp làm mờ
                    vec4 camColor = boxBlur(tDiffuse, uv, uBlur);
                    gl_FragColor = camColor;
                }
            `
        };

        // Kích hoạt camera sau của điện thoại
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" }, // Ép buộc lấy camera sau
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
                setupThreeJS();
                uiContainer.style.background = "rgba(0,0,0,0.2)"; // Làm trong suốt UI để nhìn
            } catch (err) {
                alert("Không thể truy cập camera sau. Hãy chắc chắn bạn cấp quyền và dùng HTTPS/localhost. Thử dùng camera mặc định.");
                // Fallback nếu không có camera sau cụ thể (như trên máy tính)
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = fallbackStream;
                video.play();
                setupThreeJS();
            }
        }

        function setupThreeJS() {
            // Khởi tạo Scene phẳng để vẽ 2D Shader
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Đưa luồng video thành Texture
            videoTexture = new THREE.VideoTexture(video);
            
            // Khởi tạo các tham số truyền vào Shader (Uniforms)
            const uniforms = {
                tDiffuse: { value: videoTexture },
                uBlur: { value: parseFloat(blurSlider.value) },
                uDistortion: { value: parseFloat(fishSlider.value) }
            };

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: CustomVRShader.vertexShader,
                fragmentShader: CustomVRShader.fragmentShader
            });

            // Vẽ một mặt phẳng phủ kín màn hình
            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, shaderMaterial);
            scene.add(mesh);

            // Lắng nghe sự kiện thay đổi thanh trượt
            blurSlider.addEventListener('input', (e) => {
                shaderMaterial.uniforms.uBlur.value = parseFloat(e.target.value);
            });
            fishSlider.addEventListener('input', (e) => {
                shaderMaterial.uniforms.uDistortion.value = parseFloat(e.target.value);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            initCamera();
            startBtn.classList.add('hidden'); // Ẩn nút bắt đầu sau khi bấm
        });
    </script>
</body>
</html>
