
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Low Vision Simulator</title>
    <style>
        /* Tối ưu hóa hiển thị toàn màn hình và chống tràn dữ liệu */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        /* Khung chứa giao diện chia đôi màn hình VR */
        .vr-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Cấu hình cho từng mắt (Trái & Phải) */
        .vr-view {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            /* Tạo đường viền giả lập thấu kính VR Cardboard tròn nhẹ */
            padding: 10px;
        }

        /* Thẻ video hiển thị camera của từng mắt */
        .vr-view video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 40px; /* Bo góc giống ảnh mẫu Google Cardboard */
            /* Lập gương trục X để nhìn tự nhiên như mắt thường */
            transform: scaleX(-1); 
            
            /* Áp dụng bộ lọc Gaussian Blur mặc định */
            filter: blur(10px); 
            transition: filter 0.05s linear;
        }

        /* Vạch đen phân tách 2 mắt ở chính giữa màn hình */
        .center-divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #111;
            transform: translateX(-50%);
            z-index: 5;
        }

        /* Thanh điều khiển tăng giảm độ nhòe */
        .controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls label {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .controls input[type="range"] {
            width: 260px;
            height: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Vạch chia đôi kính VR -->
    <div class="center-divider"></div>

    <!-- Khu vực hiển thị VR -->
    <div class="vr-container">
        <!-- Mắt trái -->
        <div class="vr-view">
            <video id="left-cam" autoplay playsinline muted></video>
        </div>
        <!-- Mắt phải -->
        <div class="vr-view">
            <video id="right-cam" autoplay playsinline muted></video>
        </div>
    </div>

    <!-- Thanh trượt điều chỉnh mức độ mô phỏng khiếm thị -->
    <div class="controls">
        <label for="blur-slider">Mức độ mờ (Blur): <span id="blur-val">10</span>px</label>
        <input type="range" id="blur-slider" min="0" max="50" value="10">
    </div>

    <script>
        const leftCam = document.getElementById('left-cam');
        const rightCam = document.getElementById('right-cam');
        const slider = document.getElementById('blur-slider');
        const blurVal = document.getElementById('blur-val');

        // Hàm kích hoạt camera trước và truyền vào cả 2 màn hình VR
        async function initVRCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: "user", // Gọi camera trước
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Gán cùng một luồng stream cho cả 2 thẻ video trái và phải
                leftCam.srcObject = stream;
                rightCam.srcObject = stream;
            } catch (error) {
                console.error("Lỗi truy cập camera:", error);
                alert("Vui lòng cấp quyền truy cập camera trước để trải nghiệm giả lập VR!");
            }
        }

        // Lắng nghe sự kiện kéo thanh trượt để đổi độ nhòe Gaussian Blur
        slider.addEventListener('input', (e) => {
            const value = e.target.value;
            blurVal.textContent = value;
            
            // Thay đổi thuộc tính filter: blur() của CSS trên cả 2 màn hình mắt
            leftCam.style.filter = `blur(${value}px)`;
            rightCam.style.filter = `blur(${value}px)`;
        });

        // Tự động chạy khi tải xong trang
        window.addEventListener('DOMContentLoaded', initVRCamera);
    </script>
</body>
</html>
